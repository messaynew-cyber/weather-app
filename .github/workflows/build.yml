name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
      - name: Bootstrap Flutter project
        run: flutter create --platforms android --project-name weather_app --org com.tobia .
      - run: flutter pub get
      - name: Build APK
        id: build_apk
        run: flutter build apk --release 2>&1 | tee build.log
        continue-on-error: true
      - name: ❌ Build Failed
        if: steps.build_apk.outcome == 'failure'
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo '"```"' >> $GITHUB_STEP_SUMMARY
          tail -80 build.log >> $GITHUB_STEP_SUMMARY
          echo '"```"' >> $GITHUB_STEP_SUMMARY
          grep -iE "error|Error|ERROR|fatal|FAIL" build.log | tail -15 | while read line; do
            echo "::error ::${line}"
          done
          exit 1
      - name: Upload APK Artifact
        if: steps.build_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
